<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 02 - Text Formatting</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">
</head>
<body>
  <h1>Heading 1</h1>
  <h2>Heading 2</h2>
  <h3>Heading 3</h3>
  <h4>Heading 4</h4>
  <h5>Heading 5</h5>
  <h6>Heading 6</h6>

  <p>This is a normal paragraph. <strong>This text is important.</strong> <em>This text is emphasized.</em></p>
  
  <p>Use <mark>mark</mark> for highlighted text, <small>small</small> for small text, and <code>code</code> for inline code snippets.</p>
  
  <blockquote>Practice every day and your coding skill will improve.</blockquote>
</body>
</html>
