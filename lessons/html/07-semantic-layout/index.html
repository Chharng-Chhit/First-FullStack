<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>HTML 07 - Semantic Layout</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">
</head>
<body>
  <header>
    <h2>Website Header</h2>
    <nav>
      <a href="#home">Home</a> |
      <a href="#about">About</a> |
      <a href="#contact">Contact</a>
    </nav>

  <main>
    <section>

    <p>Footer: copyright and contact information.</p>
  </footer>

</html>
