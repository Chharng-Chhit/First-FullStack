<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 06 - Forms</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">
</head>
<body>
  <h2>Registration Form</h2>
  <form action="#" method="post">
    <p>
      <label for="name">Full Name</label><br>
      <input id="name" name="fullname" type="text" placeholder="Enter your name" required>
    </p>

    <p>
      <label for="email">Email Address</label><br>
      <input id="email" name="email" type="email" placeholder="example@gmail.com" required>
    </p>

    <p>
      <label>Gender</label><br>
      <label><input type="radio" name="gender" value="male" checked> Male</label>
      <label><input type="radio" name="gender" value="female"> Female</label>
      <label><input type="radio" name="gender" value="other"> Other</label>
    </p>

    <p>
      <label for="course">Preferred Course</label><br>
      <select id="course" name="course">
        <option value="">Choose a course</option>
        <option value="html">HTML Basic</option>
        <option value="css">CSS Grid & Flexbox</option>
        <option value="js">JavaScript DOM</option>
      </select>
    </p>

    <p>
      <label>Skills to Learn</label><br>
      <label><input type="checkbox" name="skills" value="html" checked> HTML Basics</label>
      <label><input type="checkbox" name="skills" value="css"> CSS Styling</label>
      <label><input type="checkbox" name="skills" value="javascript"> JavaScript Interactive</label>
    </p>

    <p>
      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="4" placeholder="Write something to the instructor..."></textarea>
    </p>

    <p>
      <button type="submit">Submit Form</button>
    </p>
  </form>
</body>
</html>
