server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 55M;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # ── API routes  (/api/*) ─────────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;

        # CORS – allow the Vue frontend (and any origin in dev)
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Sanctum CSRF cookie route ────────────────────────────────
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;

        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Default / catch-all ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Deny hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include                 fastcgi_params;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 60;

        # Forward real client IP when behind a reverse proxy
        fastcgi_param           HTTP_X_REAL_IP        $remote_addr;
        fastcgi_param           HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
    }

    # ── Static asset caching ─────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
